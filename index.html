<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.8.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="main">
      <!-- <nav></nav> -->
      <section class="allElems">
        <div class="todo elems" id="1">
          <img
            src="https://plus.unsplash.com/premium_vector-1717511155337-6ed3d51bc2d8?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Nnx8dG9kbyUyMGxpc3R8ZW58MHx8MHx8fDA%3D"
            alt=""
          />
          <h2>To do list</h2>
        </div>

        <div class="Daily elems" id="2">
          <img
            src="https://plus.unsplash.com/premium_vector-1732645110590-b1231bd46439?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTI4fHxkYWlseSUyMHBsYW5uZXJ8ZW58MHx8MHx8fDA%3D"
            alt=""
          />
          <h2>Daily Planner</h2>
        </div>

        <div class="motivation elems" id="3">
          <img
            src="https://plus.unsplash.com/premium_photo-1685885584657-f1a5d2af5d99?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTN8fG1vdGl2YXRpb24lMjBkYXJrfGVufDB8fDB8fHww"
            alt=""
          />
          <h2>Motivation</h2>
        </div>

        <div class="pomodoro elems" id="4">
          <img
            src="https://images.unsplash.com/photo-1641567926412-7a6158b8e81f?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTV8fHRpbWVyfGVufDB8fDB8fHww"
            alt=""
          />
          <h2>Pomodoro Timer</h2>
        </div>

        <div class="goals elems" id="5">
          <img
            src="https://plus.unsplash.com/premium_vector-1763905820757-173d9c38de95?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTR8fGRhaWx5JTIwZ29hbHN8ZW58MHwxfDB8fHww"
            alt=""
          />
          <h2>Daily Goals</h2>
        </div>
      </section>
      <section class="fullelem todo-full">
        <button class="back" id="0">Close</button>
        <h2>Your personalised Task list</h2>
        <div class="todo-container">
          <div class="addTask">
            <form>
              <!-- <h5>Add Task</h5> -->
              <input type="text" name="" id="" placeholder="Enter Task" />
              <textarea name="" id="" placeholder="Enter details"></textarea>
              <button>Add Task</button>
            </form>
          </div>
          <div class="allTask">
            <div class="task">
              <h5>Gym Jao</h5>
              <button>Mark as Completed</button>

            </div>
          </div>
        </div>
      </section>

      <section class="fullelem daily-planner-full">
        <button class="back" id="1">Close</button>
        <h1>Daily Planner</h1>
      </section>

      <section class="fullelem motivational-full">
        <button class="back" id="2">Close</button>
        <h1>Motivational Quote</h1>
      </section>

      <section class="fullelem pomodoro-full">
        <button class="back" id="3">Close</button>
        <h1>Pomodoro Timer</h1>
      </section>

      <section class="fullelem daily-full">
        <button class="back" id="4">Close</button>
        <h1>Daily Goals</h1>
      </section>
    </div>
    <script src="script.js"></script>
  </body>
</html>
